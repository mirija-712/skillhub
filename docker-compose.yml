services:
  # API Spring — comptes utilisateurs (table utilisateurs partagée avec Laravel)
  auth:
    build:
      context: ./authentification_back
    container_name: skillhub_auth
    ports:
      - "8080:8080"
    environment:
      APP_MASTER_KEY: ${APP_MASTER_KEY:-docker_dev_master_key_change_me_min_32_chars}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/skillhub?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: skillhub
      SPRING_DATASOURCE_PASSWORD: skillhubpass
      SERVER_PORT: "8080"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8080"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    depends_on:
      mysql:
        condition: service_healthy

  api:
    build:
      context: ./skillhub_back
    container_name: skillhub_back
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_URL: http://localhost:8000
      SESSION_DRIVER: file
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: skillhub
      DB_USERNAME: skillhub
      DB_PASSWORD: skillhubpass
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: skillhub_activity_log
      MONGODB_COLLECTION: activity_logs
      AUTHENTIFICATION_API_URL: http://auth:8080/api
      AUTHENTIFICATION_API_TIMEOUT: "10"
    volumes:
      - ./skillhub_back/storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_started
      auth:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: skillhub_mysql
    environment:
      MYSQL_DATABASE: skillhub
      MYSQL_USER: skillhub
      MYSQL_PASSWORD: skillhubpass
      MYSQL_ROOT_PASSWORD: rootpass
    # Hôte → conteneur 3306 : port hôte rare pour limiter les conflits (3306/3307 souvent pris).
    # Depuis Windows : localhost:13306. L’API dans Docker utilise toujours mysql:3306.
    ports:
      - "13306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  mongo:
    image: mongo:7.0
    container_name: skillhub_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  frontend:
    build:
      context: ./skillhub_front
      args:
        VITE_API_URL: /api
        VITE_AUTH_API_URL: /auth-api
    container_name: skillhub_front
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: /api
    depends_on:
      - api
      - auth

volumes:
  mysql-data:
  mongo-data:
