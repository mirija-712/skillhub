# Profil "test" : base H2 en mémoire (pas de MySQL) — exigence TP4 pour CI et tests locaux.
# APP_MASTER_KEY : doublon pratique avec Surefire ; la clé factice sert uniquement aux tests.

spring.datasource.url=jdbc:h2:mem:tp1test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

app.auth.lock-duration=3s
app.auth.max-failed-attempts=5
app.auth.timestamp-skew-seconds=60
app.auth.nonce-ttl-seconds=120
# TP4 — clé factice CI / tests (profil test), alignée sur l’énoncé
APP_MASTER_KEY=test_master_key_for_ci_only

logging.file.name=logs/test-authentification.log
