spring.application.name=authentification_back

# TP2 — lockout
app.auth.lock-duration=2m
app.auth.max-failed-attempts=5
# TP3 — fenêtre timestamp (± secondes), TTL nonce en base
app.auth.timestamp-skew-seconds=60
app.auth.nonce-ttl-seconds=120
# --- TP4 : Master Key ---
# Sans APP_MASTER_KEY, Spring ne peut pas créer PasswordEncryptionService → l'application ne démarre pas.
# Ne pas mettre la vraie clé ici : utiliser l'environnement (IDE, Docker, systemd, etc.).
# Exemple PowerShell : $env:APP_MASTER_KEY = "cle-longue-aleatoire"

# MySQL — même base que skillhub_back (utilisateurs partagés). Surcharge possible : AUTH_DB_URL, AUTH_DB_USERNAME, AUTH_DB_PASSWORD
spring.datasource.url=${AUTH_DB_URL:jdbc:mysql://127.0.0.1:3306/skillhub_perso?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${AUTH_DB_USERNAME:root}
spring.datasource.password=${AUTH_DB_PASSWORD:}

# Schéma MySQL géré par les migrations Laravel (skillhub_back) : pas de DDL Hibernate en runtime.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

logging.file.name=logs/authentification.log
logging.level.com.example.authentification_back=INFO

server.port=8080
