# CI sur main uniquement : Laravel, React, authentification Spring, validation docker-compose + build images.
# Pas de CD de publication d'images (projet solo).
# Si tous les fichiers modifiés sont ignorés (paths-ignore), le workflow ne s'exécute pas.

name: CI Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "Doc/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "Doc/**"

permissions:
  contents: read

jobs:
  authentification:
    name: Authentification — Maven test & package
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: authentification_back

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: authentification_back/pom.xml

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Maven verify (tests + JaCoCo)
        run: ./mvnw -B verify
        env:
          APP_MASTER_KEY: test_master_key_for_ci_only

      - name: Upload Surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: authentification-surefire
          path: authentification_back/target/surefire-reports/

  backend:
    name: Backend — Install & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: skillhub_back

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          # Ne pas activer le paquet apt "mongodb" : souvent ext-mongodb 2.1.4, incompatible avec
          # mongodb/mongodb 2.2 (exige ext-mongodb ^2.2). Les tests n’utilisent pas Mongo sans MONGODB_URI.
          extensions: mbstring, xml, pdo_sqlite, sqlite3, bcmath, intl, openssl, zip
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --ignore-platform-req=ext-mongodb

      - name: Copy environment
        run: cp .env.example .env

      - name: Disable MongoDB in CI tests
        run: echo "MONGODB_URI=" >> .env

      - name: Generate APP_KEY
        run: php artisan key:generate

      - name: Run PHPUnit (Unit + Feature)
        run: |
          mkdir -p reports
          ./vendor/bin/phpunit --log-junit reports/junit.xml

      - name: Upload PHPUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-junit
          path: skillhub_back/reports/junit.xml

  frontend:
    name: Frontend — Install, Lint, Test & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: skillhub_front

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: skillhub_front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm run test

      - name: Production build
        run: npm run build

  # Stack locale = 4 services (cf. docker-compose.yml) :
  # - api + frontend : images construites depuis les Dockerfiles du dépôt
  # - mysql + mongo : images officielles (pull Docker Hub), pas de Dockerfile projet
  docker-images:
    name: Docker — Stack 5 services (build 3 + pull 2)
    runs-on: ubuntu-latest
    needs: [authentification, backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Valider docker-compose.yml
        run: docker compose -f docker-compose.yml config --quiet

      - name: Images officielles MySQL & Mongo (2/5 — images Docker Hub)
        run: docker compose -f docker-compose.yml pull mysql mongo

      - name: Build images custom auth, api & frontend (Dockerfiles du repo)
        run: |
          docker build -t skillhub-auth:${{ github.sha }} ./authentification_back
          docker build -t skillhub-api:${{ github.sha }} ./skillhub_back
          docker build \
            -t skillhub-front:${{ github.sha }} \
            --build-arg VITE_API_URL=/api \
            --build-arg VITE_AUTH_API_URL=/auth-api \
            ./skillhub_front

  sonarcloud:
    name: SonarCloud — Monorepo scan (auth + back + front)
    runs-on: ubuntu-latest
    needs: [authentification, backend, frontend]
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: authentification_back/pom.xml

      - name: Build Java test reports for Sonar (JaCoCo)
        if: ${{ env.SONAR_TOKEN != '' }}
        working-directory: authentification_back
        env:
          APP_MASTER_KEY: test_master_key_for_ci_only
        run: |
          chmod +x mvnw
          ./mvnw -B verify

      - name: SonarCloud Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

