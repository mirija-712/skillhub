name: SonarCloud Analysis

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  sonarcloud:
    name: PHP Tests and SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, pdo_sqlite, sqlite3, bcmath, intl, openssl, zip
          coverage: xdebug

      - name: Installation des dépendances PHP (Composer)
        working-directory: skillhub_back
        run: composer install --no-interaction --prefer-dist --no-progress --ignore-platform-req=ext-mongodb

      - name: Exécution des tests PHPUnit avec couverture
        working-directory: skillhub_back
        env:
          XDEBUG_MODE: coverage
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p reports
          ./vendor/bin/phpunit --log-junit reports/junit.xml --coverage-clover reports/clover.xml

      - name: Analyse SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
