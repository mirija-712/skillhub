name: SonarCloud Analysis

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  sonarcloud:
    name: Java + PHP Tests and SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: authentification_back/pom.xml

      - name: Exécution des tests Java (JaCoCo)
        working-directory: authentification_back
        env:
          APP_MASTER_KEY: test_master_key_for_ci_only
        run: |
          chmod +x mvnw
          ./mvnw -B verify
          ./mvnw -B dependency:copy-dependencies -DincludeScope=compile -DoutputDirectory=target/dependency

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, pdo_sqlite, sqlite3, bcmath, intl, openssl, zip
          coverage: xdebug

      - name: Installation des dépendances PHP (Composer)
        working-directory: skillhub_back
        run: composer install --no-interaction --prefer-dist --no-progress --ignore-platform-req=ext-mongodb

      - name: Exécution des tests PHPUnit avec couverture
        working-directory: skillhub_back
        env:
          XDEBUG_MODE: coverage
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p reports
          ./vendor/bin/phpunit --log-junit reports/junit.xml --coverage-clover reports/clover.xml

      - name: Vérification des rapports de couverture
        run: |
          test -f authentification_back/target/site/jacoco/jacoco.xml
          test -f skillhub_back/reports/junit.xml
          test -f skillhub_back/reports/clover.xml

      - name: Analyse SonarCloud
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
