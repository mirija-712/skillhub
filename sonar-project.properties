sonar.projectKey=mirija-712_skillhub
sonar.organization=mirija-712
sonar.host.url=https://sonarcloud.io

# Monorepo: analyser les 3 services applicatifs.
sonar.sources=authentification_back/src/main,skillhub_back/app,skillhub_front/src

# Exclure les artefacts, dependances et dossiers generes.
sonar.exclusions=**/vendor/**,**/node_modules/**,**/target/**,**/storage/**,**/bootstrap/cache/**,**/public/build/**,**/dist/**,**/coverage/**

# Tests pour meilleure classification (sans imposer de rapport de couverture cote PHP/JS).
sonar.tests=authentification_back/src/test,skillhub_back/tests,skillhub_front/src
sonar.test.inclusions=**/*Test.java,**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx

# Couverture Java disponible via JaCoCo.
sonar.coverage.jacoco.xmlReportPaths=authentification_back/target/site/jacoco/jacoco.xml

# Classes compilees requises par l'analyseur Java Sonar.
sonar.java.binaries=authentification_back/target/classes

# Forcer l'attente du calcul Quality Gate pendant la CI.
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

